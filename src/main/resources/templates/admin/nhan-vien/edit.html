<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout/main :: layout(~{::main}, ~{::title})}">

<head>
    <title>Cập nhật nhân viên - PeakSneaker </title>
</head>

<body>
    <main>
        <div class="container-fluid p-0">
            <div class="mb-4">
                <h4 class="fw-bold section-title">Quản lý tài khoản / <span class="fw-bold">Quản lý nhân viên</span></h4>
            </div>

            <form th:action="@{/admin/nhan-vien/save}" th:object="${nhanVien}" method="POST" id="employeeForm"
                enctype="multipart/form-data">
                
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{maNhanVien}">
                <input type="hidden" th:field="*{ngayTao}">
                <input type="hidden" th:field="*{xoaMem}">
                <input type="hidden" th:field="*{matKhau}">
                <input type="hidden" th:field="*{anh}">

                <div class="card shadow-sm border-0 rounded-4 p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold section-title mb-0">CẬP NHẬT NHÂN VIÊN</h4>
                        <div class="d-flex gap-2">
                            <a th:href="@{/admin/nhan-vien}"
                                class="btn btn-light-outline rounded-pill px-4 py-2 d-flex align-items-center gap-2">
                                <i class="bi bi-arrow-left"></i> Quay lại
                            </a>
                            <button type="submit"
                                class="btn btn-add-customer rounded-pill px-4 py-2 d-flex align-items-center gap-2 text-white border-0 shadow-sm">
                                <i class="bi bi-save"></i> Lưu thay đổi
                            </button>
                        </div>
                    </div>
                    
                    <div class="text-center mb-5 mt-2">
                        <div class="position-relative d-inline-block">
                            <div class="avatar-upload rounded-circle bg-light d-flex align-items-center justify-content-center mx-auto shadow-sm"
                                style="width: 150px; height: 150px; border: 2px dashed #dee2e6; cursor: pointer;"
                                onclick="document.getElementById('avatarInput').click()">
                                <div id="uploadPlaceholder" th:classappend="*{anh != null} ? 'd-none' : ''"
                                    class="text-center text-muted">
                                    <i class="bi bi-camera fs-2 d-block"></i>
                                    <span class="small">Đổi ảnh</span>
                                </div>
                                <img id="avatarPreview" th:src="*{anh != null} ? @{'/uploads/nhan-vien/' + *{anh}} : ''"
                                    th:classappend="*{anh == null} ? 'd-none' : ''"
                                    class="rounded-circle position-absolute top-0 start-0 w-100 h-100"
                                    style="object-fit: cover;">
                            </div>
                            <input type="file" id="avatarInput" name="anhFile" class="d-none" accept="image null,
                district:  null,
                ward:  null
            };

            document.addEventListener('DOMContentLoaded', function() {
                if (typeof initAddressSelects === 'function') {
                    initAddressSelects('.city-select', '.district-select', '.ward-select', initialValues);
                }
            });
        </script>
    </main>
</body>

</html>
