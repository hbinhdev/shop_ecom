<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout/main :: layout(~{::main}, ~{::title})}">

<head>
    <title>Quản lý khách hàng - PeakSneaker </title>
</head>

<body>
    <main>
        <div class="container-fluid p-0">
            <!-- Breadcrumb / Header Title -->
            <div class="mb-4">
                <h4 class="fw-bold section-title">Quản lý tài khoản / <span class="fw-bold section-title">Quản lý khách
                        hàng</span></h4>
            </div>

            <!-- Filter Section -->
            <form th:action="@{/admin/khach-hang}" method="GET" id="filterForm">
                <div class="card shadow-sm border-0 rounded-4 mb-4">
                    <div class="card-body p-4">
                        <div class="row g-3 align-items-center mb-4">
                            <div class="col-md-5">
                                <div class="search-box position-relative">
                                    <i
                                        class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                    <input type="text" name="search" th:value="${search}"
                                        class="form-control rounded-pill ps-5 py-2 border-1"
                                        placeholder="Tìm theo Mã, Tên, SĐT, Email...">
                                </div>
                            </div>
                            <div class="col-md-7 d-flex justify-content-end gap-2">
                                <a th:href="@{/admin/khach-hang}"
                                    class="btn btn-dark rounded-pill px-4 py-2 d-flex align-items-center gap-2 btn-reset-filter">
                                    <i class="bi bi-arrow-counterclockwise"></i> Đặt lại bộ lọc
                                </a>
                                <a th:href="@{/admin/khach-hang/export(search=${search}, gioiTinh=${gioiTinh}, trangThai=${trangThai})}"
                                    class="btn btn-excel rounded-pill px-4 py-2 d-flex align-items-center gap-2">
                                    <i class="bi bi-file-earmark-excel"></i> Xuất Excel
                                </a>
                                <a th:href="@{/admin/khach-hang/create}"
                                    class="btn btn-add-customer rounded-pill px-4 py-2 d-flex align-items-center gap-2 text-white border-0">
                                    <i class="bi bi-plus-lg"></i> Thêm khách hàng
                                </a>
                            </div>
                        </div>

                        <div class="row g-3 align-items-center">
                            <div class="col-md-4 d-flex align-items-center gap-3">
                                <label class="form-label mb-0 text-nowrap fw-medium">Giới tính:</label>
                                <select name="gioiTinh" class="form-select rounded-pill border-1 bg-light-subtle"
                                    onchange="this.form.submit()">
                                    <option value="" th:selected="${gioiTinh == null or gioiTinh == ''}">Tất cả</option>
                                    <option value="Nam" th:selected="${gioiTinh == 'Nam'}">Nam</option>
                                    <option value="Nữ" th:selected="${gioiTinh == 'Nữ'}">Nữ</option>
                                </select>
                            </div>
                            <div class="col-md-4 d-flex align-items-center gap-3">
                                <label class="form-label mb-0 text-nowrap fw-medium">Trạng thái:</label>
                                <select name="trangThai" class="form-select rounded-pill border-1 bg-light-subtle"
                                    onchange="this.form.submit()">
                                    <option value="" th:selected="${trangThai == null}">Tất cả</option>
                                    <option value="1" th:selected="${trangThai == 1}">Hoạt động</option>
                                    <option value="0" th:selected="${trangThai == 0}">Ngừng hoạt động</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </form>

            <!-- Table Section -->
            <div class="custom-table overflow-hidden shadow-sm rounded-4 bg-white">
                <table class="table align-middle">
                    <thead class="bg-light text-muted small text-uppercase fw-bold">
                        <tr>
                            <th class="ps-4 py-3">STT</th>
                            <th class="py-3">Mã khách hàng</th>
                            <th class="py-3">Họ tên</th>
                            <th class="py-3">SĐT</th>
                            <th class="py-3">Email</th>
                            <th class="py-3">Địa chỉ</th>
                            <th class="py-3">Trạng thái</th>
                            <th class="text-center py-3 pe-4">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="kh, stat : ${khachHangs}" class="border-bottom">
                            <td class="ps-4 fw-medium text-muted"
                                th:text="${stat.index + 1 + (khachHangPage.number * khachHangPage.size)}">1</td>
                            <td class="small fw-semibold text-dark" th:text="${kh.maKhachHang}">KH00001</td>
                            <td>
                                <div class="fw-semibold text-dark mb-0 lh-sm" th:text="${kh.tenDayDu}">Nguyễn Văn A
                                </div>
                            </td>
                            <td class="small text-muted" th:text="${kh.soDienThoai}">0911111111</td>
                            <td class="small text-muted" th:text="${kh.email}">kha.a@gmail.com</td>
                            <td class="small text-muted text-truncate" style="max-width: 250px;">
                                <th:block th:each="dc : ${kh.danhSachDiaChi}">
                                    <span th:if="${dc.diaChiMacDinh}"
                                        th:text="${(dc.chiTiet != null ? dc.chiTiet + ', ' : '') + dc.xaPhuong + ', ' + dc.quanHuyen + ', ' + dc.tinhThanhPho}">
                                    </span>
                                </th:block>
                                <span
                                    th:if="${#lists.size(kh.danhSachDiaChi) > 0 and #lists.toList(kh.danhSachDiaChi).?[diaChiMacDinh == true].size() == 0}"
                                    th:text="${(kh.danhSachDiaChi[0].chiTiet != null ? kh.danhSachDiaChi[0].chiTiet + ', ' : '') + kh.danhSachDiaChi[0].xaPhuong + ', ' + kh.danhSachDiaChi[0].quanHuyen + ', ' + kh.danhSachDiaChi[0].tinhThanhPho}">
                                </span>
                                <span th:if="${#lists.isEmpty(kh.danhSachDiaChi)}">-</span>
                            </td>
                            <td>
                                <span th:if="${!kh.xoaMem}"
                                    class="badge rounded-pill bg-danger-subtle text-danger px-3 py-2 fw-medium border border-danger-subtle">Hoạt
                                    động</span>
                                <span th:if="${kh.xoaMem}"
                                    class="badge rounded-pill bg-secondary-subtle text-dark px-3 py-2 fw-medium border">Ngừng
                                    hoạt động</span>
                            </td>
                            <td class="text-center pe-4">
                                <div class="d-flex justify-content-center align-items-center gap-2">
                                    <div class="form-check form-switch p-0 m-0">
                                        <input class="form-check-input ms-0 custom-switch status-toggle" type="checkbox"
                                            th:checked="${!kh.xoaMem}" th:data-id="${kh.id}"
                                            onchange="confirmToggleStatus(this)" style="cursor: pointer;">
                                    </div>
                                    <a th:href="@{/admin/khach-hang/edit/{id}(id=${kh.id})}"
                                        class="btn-icon rounded-circle shadow-xs">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(khachHangs)}">
                            <td colspan="8" class="text-center py-5 text-muted">
                                <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                                Không tìm thấy khách hàng phù hợp.
                            </td>
                        </tr>
                    </tbody>
                </table>
                <!-- Pagination Footer -->
                <div
                    th:replace="~{admin/fragments/pagination :: pagination(${khachHangPage}, '/admin/khach-hang', 'search=${search}, gioiTinh=${gioiTinh}, trangThai=${trangThai}')}">
                </div>
            </div>
        </div>
        <!-- Status Toggle and Common Scripts -->
        <div th:replace="~{admin/fragments/scripts :: common_scripts}"></div>
        <script th:inline="javascript">
            async function confirmToggleStatus(checkbox) {
                await confirmToggle(checkbox, '/admin/khach-hang/toggle-status', 'Đã cập nhật trạng thái khách hàng!', 'Lỗi khi cập nhật trạng thái.');
            }
        </script>
    </main>
</body>

</html>
