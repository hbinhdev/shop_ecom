<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout/main :: layout(~{::main}, ~{::title})}">

<head>
    <title>Thêm khách hàng - PeakSneaker </title>
</head>

<body>
    <main>
        <div class="container-fluid p-0">
            
            <div class="mb-4">
                <h4 class="fw-bold section-title">Quản lý tài khoản / <span class="fw-bold">Quản lý khách hàng</span>
                </h4>
            </div>

            <form th:action="@{/admin/khach-hang/save}" th:object="${khachHang}" method="POST" id="customerForm">
                <div class="card shadow-sm border-0 rounded-4 p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold section-title mb-0">THÊM KHÁCH HÀNG</h4>
                        <div class="d-flex gap-2">
                            <a th:href="@{/admin/khach-hang}"
                                class="btn btn-light-outline rounded-pill px-4 py-2 d-flex align-items-center gap-2">
                                <i class="bi bi-arrow-left"></i> Quay lại
                            </a>
                            <button type="submit"
                                class="btn btn-add-customer rounded-pill px-4 py-2 d-flex align-items-center gap-2 text-white border-0 shadow-sm">
                                <i class="bi bi-save"></i> Lưu
                            </button>
                        </div>
                    </div>

                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Tên khách hàng <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control rounded-pill border-1 bg-light-subtle py-2 px-3"
                                th:field="*{tenDayDu}" placeholder="Nhập tên khách hàng" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control rounded-pill border-1 bg-light-subtle py-2 px-3"
                                th:field="*{email}" placeholder="example@gmail.com" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Số điện thoại <span class="text-danger">*</span></label>
                            <input type="text" class="form-control rounded-pill border-1 bg-light-subtle py-2 px-3"
                                th:field="*{soDienThoai}" placeholder="0123456789"
                                pattern="0\d{9}" title="Số điện thoại phải gồm 10 chữ số và bắt đầu bằng số 0" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Giới tính</label>
                            <select class="form-select rounded-pill border-1 bg-light-subtle py-2 px-3"
                                th:field="*{gioiTinh}">
                                <option value="">-- Chọn --</option>
                                <option value="Nam">Nam</option>
                                <option value="Nữ">Nữ</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Ngày sinh</label>
                            <input type="date" class="form-control rounded-pill border-1 bg-light-subtle py-2 px-3"
                                th:field="*{ngaySinh}">
                        </div>
                    </div>

                    <hr class="my-4 text-muted border-1">

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold mb-0">Địa chỉ (có thể thêm nhiều) <span class="text-danger">*</span></h5>
                        <button type="button" class="btn btn-outline-dark rounded-pill px-3 py-1 btn-sm"
                            onclick="addAddress()">
                            <i class="bi bi-plus-lg"></i> Thêm địa chỉ
                        </button>
                    </div>

                    <div id="addressContainer">
                        <div th:each="dc, stat : *{danhSachDiaChi}"
                            class="address-item card bg-light-subtle border-1 rounded-4 p-3 mb-3 border-light position-relative">
                            <div class="row g-3">
                                <div class="col-12 d-flex justify-content-between align-items-center mb-2">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" th:name="'defaultAddress'"
                                            th:id="'defaultAddress' + ${stat.index}" th:checked="${dc.diaChiMacDinh}"
                                            onchange="updateDefaultStatus(this)">
                                        <label class="form-check-label ms-1" th:for="'defaultAddress' + ${stat.index}">
                                            Đặt làm mặc định
                                        </label>
                                        <input type="hidden"
                                            th:field="*{danhSachDiaChi[__${stat.index}__].diaChiMacDinh}"
                                            class="default-status-hidden">
                                    </div>
                                    <button type="button" class="btn btn-outline-danger btn-sm rounded-pill px-3"
                                        onclick="removeAddress(this)">
                                        <i class="bi bi-trash"></i> Xóa
                                    </button>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-medium text-muted">Tên người nhận *</label>
                                    <input type="text"
                                        class="form-control form-control-sm rounded-4 border-1 bg-white py-2"
                                        th:field="*{danhSachDiaChi[__${stat.index}__].tenNguoiNhan}"
                                        placeholder="Họ và tên người nhận" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-medium text-muted">Số nhà / Đường</label>
                                    <input type="text"
                                        class="form-control form-control-sm rounded-4 border-1 bg-white py-2"
                                        th:field="*{danhSachDiaChi[__${stat.index}__].chiTiet}"
                                        placeholder="Ví dụ: 12A Nguyễn Trãi">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-medium text-muted">Tỉnh/Thành</label>
                                    <select
                                        class="form-select form-select-sm rounded-4 border-1 bg-white py-2 city-select"
                                        th:field="*{danhSachDiaChi[__${stat.index}__].tinhThanhPho}">
                                        <option value="">-- Chọn tỉnh/thành --</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-medium text-muted">Quận/Huyện</label>
                                    <select
                                        class="form-select form-select-sm rounded-4 border-1 bg-white py-2 district-select"
                                        th:field="*{danhSachDiaChi[__${stat.index}__].quanHuyen}">
                                        <option value="">-- Chọn quận/huyện --</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-medium text-muted">Phường/Xã</label>
                                    <select
                                        class="form-select form-select-sm rounded-4 border-1 bg-white py-2 ward-select"
                                        th:field="*{danhSachDiaChi[__${stat.index}__].xaPhuong}">
                                        <option value="">-- Chọn phường/xã --</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <script th:inline="javascript">
            let addressIndex =  1;

            function addAddress() {
                const container = document.getElementById('addressContainer');
                const html = `
                    <div class="address-item card bg-light-subtle border-1 rounded-4 p-3 mb-3 border-light position-relative">
                        <div class="row g-3">
                            <div class="col-12 d-flex justify-content-between align-items-center mb-2">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="defaultAddress" id="defaultAddress${addressIndex}" onchange="updateDefaultStatus(this)">
                                    <label class="form-check-label ms-1" for="defaultAddress${addressIndex}">
                                        Đặt làm mặc định
                                    </label>
                                    <input type="hidden" name="danhSachDiaChi[${addressIndex}].diaChiMacDinh" value="false" class="default-status-hidden">
                                </div>
                                <button type="button" class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="removeAddress(this)">
                                    <i class="bi bi-trash"></i> Xóa
                                </button>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-muted">Tên người nhận *</label>
                                <input type="text" class="form-control form-control-sm rounded-4 border-1 bg-white py-2" name="danhSachDiaChi[${addressIndex}].tenNguoiNhan" placeholder="Họ và tên người nhận" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-muted">Số nhà / Đường</label>
                                <input type="text" class="form-control form-control-sm rounded-4 border-1 bg-white py-2" name="danhSachDiaChi[${addressIndex}].chiTiet" placeholder="Ví dụ: 12A Nguyễn Trãi">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-medium text-muted">Tỉnh/Thành</label>
                                <select class="form-select form-select-sm rounded-4 border-1 bg-white py-2 city-select" name="danhSachDiaChi[${addressIndex}].tinhThanhPho">
                                    <option value="">-- Chọn tỉnh/thành --</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-medium text-muted">Quận/Huyện</label>
                                <select class="form-select form-select-sm rounded-4 border-1 bg-white py-2 district-select" name="danhSachDiaChi[${addressIndex}].quanHuyen">
                                    <option value="">-- Chọn quận/huyện --</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-medium text-muted">Phường/Xã</label>
                                <select class="form-select form-select-sm rounded-4 border-1 bg-white py-2 ward-select" name="danhSachDiaChi[${addressIndex}].xaPhuong">
                                    <option value="">-- Chọn phường/xã --</option>
                                </select>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
                
                // Khởi tạo logic chọn địa chỉ cho hàng mới
                if (typeof initAddressSelects === 'function') {
                    const newItem = container.lastElementChild;
                    const citySel = newItem.querySelector('.city-select');
                    const distSel = newItem.querySelector('.district-select');
                    const wardSel = newItem.querySelector('.ward-select');
                    initAddressSelects(citySel, distSel, wardSel);
                }
                addressIndex++;
            }

            function removeAddress(btn) {
                const item = btn.closest('.address-item');
                if (document.querySelectorAll('.address-item').length > 1) {
                    item.remove();
                } else {
                    alert('Khách hàng cần ít nhất một địa chỉ.');
                }
            }

            function updateDefaultStatus(radio) {
                document.querySelectorAll('.default-status-hidden').forEach(input => {
                    input.value = "false";
                });

                const hiddenInput = radio.closest('.form-check').querySelector('.default-status-hidden');
                hiddenInput.value = "true";
            }
            // Tự động load tỉnh thành cho địa chỉ mặc định khi vừa mở trang
            document.addEventListener('DOMContentLoaded', function() {
                if (typeof fetchProvinces === 'function') {
                    // 1. Tải danh sách tỉnh thành cho TẤT CẢ các ô city-select hiện có
                    document.querySelectorAll('.city-select').forEach(select => {
                        fetchProvinces(select);
                    });
                    
                    // 2. Thiết lập sự kiện change cho các hàng địa chỉ
                    document.querySelectorAll('.address-item').forEach(item => {
                        const cityEl = item.querySelector('.city-select');
                        const distEl = item.querySelector('.district-select');
                        const wardEl = item.querySelector('.ward-select');
                        
                        cityEl.addEventListener('change', async (e) => {
                            const code = e.target.options[e.target.selectedIndex]?.dataset?.code;
                            distEl.innerHTML = '<option value="">-- Chọn quận/huyện --</option>';
                            wardEl.innerHTML = '<option value="">-- Chọn phường/xã --</option>';
                            if (code && typeof loadDistricts === 'function') await loadDistricts(code, distEl);
                        });

                        distEl.addEventListener('change', async (e) => {
                            const code = e.target.options[e.target.selectedIndex]?.dataset?.code;
                            wardEl.innerHTML = '<option value="">-- Chọn phường/xã --</option>';
                            if (code && typeof loadWards === 'function') await loadWards(code, wardEl);
                        });
                    });
                }
            });
        </script>
    </main>
</body>

</html>
