<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="common_scripts">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    
    <script src="https://unpkg.com/html5-qrcode"></script>

    <script th:inline="javascript">
        // === CSRF-aware fetch helper (dùng cho mọi POST/PUT/DELETE) ===
        function getCsrfHeaders(extra = {}) {
            const token = document.querySelector('meta[name="_csrf"]')?.content;
            const header = document.querySelector('meta[name="_csrf_header"]')?.content;
            return (token && header) ? { [header]: token, ...extra } : { ...extra };
        }
        async function csrfPost(url) {
            return fetch(url, { method: 'POST', headers: getCsrfHeaders() });
        }

        // === Common Status Toggle ===
        async function confirmToggle(checkbox, url, successMsg, errorMsg) {
            const id = checkbox.getAttribute('data-id'), isChecked = checkbox.checked;
            
            const result = await Swal.fire({
                title: 'Xác nhận?', text: isChecked ? "Bạn có muốn kích hoạt lại?" : "Bạn có muốn ngừng hoạt động?",
                icon: 'question', showCancelButton: true, confirmButtonText: 'Đồng ý', cancelButtonText: 'Hủy',
                confirmButtonColor: '#2d3436', cancelButtonColor: '#636e72',
            });
            if (result.isConfirmed) {
                try {
                    const res = await csrfPost(`${url}/${id}`);
                    console.log(`[Toggle Debug] Phản hồi Server: ${res.status} ${res.statusText}`);
                    if (res.ok) {
                        Swal.fire('Thành công!', successMsg || 'Cập nhật thành công.', 'success').then(() => location.reload());
                    } else throw new Error();
                } catch (e) {
                    console.error(`[Toggle Debug] Lỗi kết nối:`, e);
                    Swal.fire('Lỗi!', errorMsg || 'Không thể kết nối máy chủ.', 'error');
                    checkbox.checked = !isChecked;
                }
            } else checkbox.checked = !isChecked;
        }

        
        const PROVINCE_API = "https://provinces.open-api.vn/api/";
        async function fetchProvinces(citySelectSelector) {
            try {
                const response = await fetch(PROVINCE_API + "p/");
                const data = await response.json();
                const citySelect = (typeof citySelectSelector === 'string') ? document.querySelector(citySelectSelector) : citySelectSelector;
                if (!citySelect) return;
                let html = `<option value="">-- Chọn tỉnh/thành --</option>`;
                data.forEach(item => {
                    html += `<option value="${item.name}" data-code="${item.code}">${item.name}</option>`;
                });
                citySelect.innerHTML = html;
            } catch (error) { console.error("Lỗi khi tải tỉnh thành:", error); }
        }

        async function loadDistricts(cityCode, districtSelectSelector) {
            try {
                const response = await fetch(`${PROVINCE_API}p/${cityCode}?depth=2`);
                const data = await response.json();
                const districtSelect = (typeof districtSelectSelector === 'string') ? document.querySelector(districtSelectSelector) : districtSelectSelector;
                if (!districtSelect) return;
                let html = `<option value="">-- Chọn quận/huyện --</option>`;
                data.districts.forEach(item => {
                    html += `<option value="${item.name}" data-code="${item.code}">${item.name}</option>`;
                });
                districtSelect.innerHTML = html;
            } catch (error) { console.error("Lỗi khi tải quận huyện:", error); }
        }

        async function loadWards(districtCode, wardSelectSelector) {
            try {
                const response = await fetch(`${PROVINCE_API}d/${districtCode}?depth=2`);
                const data = await response.json();
                const wardSelect = (typeof wardSelectSelector === 'string') ? document.querySelector(wardSelectSelector) : wardSelectSelector;
                if (!wardSelect) return;
                let html = `<option value="">-- Chọn phường/xã --</option>`;
                data.wards.forEach(item => {
                    html += `<option value="${item.name}" data-code="${item.code}">${item.name}</option>`;
                });
                wardSelect.innerHTML = html;
            } catch (error) { console.error("Lỗi khi tải phường xã:", error); }
        }

        async function initAddressSelects(citySel, distSel, wardSel, initialValues = {}) {
            const cityEl = (typeof citySel === 'string') ? document.querySelector(citySel) : citySel;
            const distEl = (typeof distSel === 'string') ? document.querySelector(distSel) : distSel;
            const wardEl = (typeof wardSel === 'string') ? document.querySelector(wardSel) : wardSel;
            
            if (!cityEl || !distEl || !wardEl) return;

            cityEl.addEventListener('change', async (e) => {
                const code = e.target.options[e.target.selectedIndex]?.dataset?.code;
                distEl.innerHTML = '<option value="">-- Chọn quận/huyện --</option>';
                wardEl.innerHTML = '<option value="">-- Chọn phường/xã --</option>';
                if (code) await loadDistricts(code, distSel);
            });

            distEl.addEventListener('change', async (e) => {
                const code = e.target.options[e.target.selectedIndex]?.dataset?.code;
                wardEl.innerHTML = '<option value="">-- Chọn phường/xã --</option>';
                if (code) await loadWards(code, wardSel);
            });

            await fetchProvinces(citySel);

            if (initialValues.city) {
                const opt = Array.from(cityEl.options).find(o => o.value === initialValues.city);
                if (opt) {
                    cityEl.value = opt.value;
                    await loadDistricts(opt.dataset.code, distSel);
                    if (initialValues.district) {
                        const optDist = Array.from(distEl.options).find(o => o.value === initialValues.district);
                        if (optDist) {
                            distEl.value = optDist.value;
                            await loadWards(optDist.dataset.code, wardSel);
                            if (initialValues.ward) {
                                const optWard = Array.from(wardEl.options).find(o => o.value === initialValues.ward);
                                if (optWard) wardEl.value = optWard.value;
                            }
                        }
                    }
                }
            }
        }

        
        function parseCCCD(qrString) {
            
            const parts = qrString.split('|');
            if (parts.length < 6) return null;
            return {
                ma: parts[0],
                hoTen: parts[2],
                ngaySinh: parts[3], // Format: DDMMYYYY
                gioiTinh: parts[4],
                diaChi: parts[5]
            };
        }

        function formatDOB(dobStr) {
            if (!dobStr || dobStr.length !== 8) return "";
            return `${dobStr.substring(4, 8)}-${dobStr.substring(2, 4)}-${dobStr.substring(0, 2)}`;
        }

        // === Image QR Scan ===
        async function scanQRFromFile(file, onResult, onError) {
            const html5QrCode = new Html5Qrcode("reader-file", { verbose: false });
            try {
                const qrText = await html5QrCode.scanFile(file, true);
                onResult(qrText);
            } catch (err) {
                onError(err);
            }
        }

        async function autoSelectAddress(addressStr, citySel, distSel, wardSel) {
            if (!addressStr) return;
            const parts = addressStr.split(',').map(p => p.trim());
            if (parts.length < 3) return;

            const provinceName = parts[parts.length - 1].toLowerCase();
            const districtName = parts[parts.length - 2].toLowerCase();
            const wardName = parts[parts.length - 3].toLowerCase();

            const cityEl = document.querySelector(citySel);
            
            // Wait for cities to load if empty
            let retryCity = 0;
            const cityInterval = setInterval(() => {
                if (cityEl.options.length > 1 || retryCity > 10) {
                    clearInterval(cityInterval);
                    processAutoSelect();
                }
                retryCity++;
            }, 200);

            function processAutoSelect() {
                // Helper to find option by text
                const findOption = (el, searchText) => {
                    return Array.from(el.options).find(opt => {
                        const text = opt.text.toLowerCase();
                        return text.includes(searchText) || searchText.includes(text);
                    });
                };

                // 1. Select Province
                let foundCity = findOption(cityEl, provinceName);
                if (foundCity) {
                    cityEl.value = foundCity.value;
                    cityEl.dispatchEvent(new Event('change'));

                    // 2. Wait and Select District
                    let retryDist = 0;
                    const distInterval = setInterval(() => {
                        const distEl = document.querySelector(distSel);
                        if (distEl.options.length > 1 || retryDist > 10) {
                            clearInterval(distInterval);
                            let foundDist = findOption(distEl, districtName);
                            if (foundDist) {
                                distEl.value = foundDist.value;
                                distEl.dispatchEvent(new Event('change'));

                                // 3. Wait and Select Ward
                                let retryWard = 0;
                                const wardInterval = setInterval(() => {
                                    const wardEl = document.querySelector(wardSel);
                                    if (wardEl.options.length > 1 || retryWard > 10) {
                                        clearInterval(wardInterval);
                                        let foundWard = findOption(wardEl, wardName);
                                        if (foundWard) wardEl.value = foundWard.value;
                                    }
                                    retryWard++;
                                }, 200);
                            }
                        }
                        retryDist++;
                    }, 200);
                }
            }
        }
        // === Dynamic Sidebar Highlight ===
        function initSidebarHighlight() {
            const currentPath = window.location.pathname;
            const menuLinks = document.querySelectorAll('.sidebar-nav a');
            
            menuLinks.forEach(link => {
                let href = link.getAttribute('href');
                if (!href || href === '#' || href.startsWith('javascript')) return;
                
                // Xử lý path khớp (hoặc bắt đầu bằng path đó)
                if (currentPath === href || (href !== '/admin' && href !== '/' && currentPath.startsWith(href))) {
                    // Xóa active cũ
                    document.querySelectorAll('.sidebar-nav li.active').forEach(el => el.classList.remove('active'));
                    
                    const li = link.closest('li');
                    if (li) {
                        li.classList.add('active');
                        
                        // Nếu nằm trong submenu thì mở submenu đó
                        const parentSubmenu = li.closest('.submenu');
                        if (parentSubmenu) {
                            parentSubmenu.classList.add('show');
                            const toggle = document.querySelector(`[data-bs-target="#${parentSubmenu.id}"]`);
                            if (toggle) {
                                toggle.setAttribute('aria-expanded', 'true');
                                toggle.classList.remove('collapsed');
                                // Highlight cả menu cha nếu cần
                                toggle.closest('li')?.classList.add('active');
                            }
                        }
                    }
                }
            });
        }

        // === Global Number Formatter ===
        const formatString = (val) => {
            if (!val) return "";
            let num = val.toString().replace(/\D/g, "");
            if (num === "") return "";
            return num.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        };

        function applyGlobalFormatting(input) {
            try {
                let cursorPosition = input.selectionStart;
                let originalValue = input.value;
                let formattedValue = formatString(originalValue);
                
                

                if (originalValue === formattedValue) return;

                input.value = formattedValue;
                
                let diff = (formattedValue.length - originalValue.length);
                let newCursor = cursorPosition + diff;
                input.setSelectionRange(newCursor, newCursor);
            } catch (e) {
                console.error("[NumberFormat Error]", e);
                input.value = formatString(input.value);
            }
        }

        function initNumberFormatter() {
            
            // Initial format for existing values
            document.querySelectorAll('.number-format').forEach(input => {
                if (input.value) {
                    
                    input.value = formatString(input.value);
                }
            });

            // Global delegation for real-time typing
            document.addEventListener('input', function(e) {
                if (e.target && e.target.classList.contains('number-format')) {
                    
                    applyGlobalFormatting(e.target);
                }
            });

            document.addEventListener('submit', function(e) {
                if (e.target && e.target.tagName === 'FORM') {
                    e.target.querySelectorAll('.number-format').forEach(input => {
                        input.value = input.value.replace(/\./g, "");
                    });
                }
            }, true);
        }

        function submitForm(el) {
            const form = el.form || el.closest('form');
            if (!form) return;
            
            // Xóa dấu chấm trước khi submit
            form.querySelectorAll('.number-format').forEach(input => {
                input.value = input.value.replace(/\./g, "");
            });
            form.submit();
        }

        // Bất kỳ khi nào script này nạp xong, nó sẽ tự kiểm tra và chạy ngay
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                initSidebarHighlight();
                initNumberFormatter();
            });
        } else {
            initSidebarHighlight();
            initNumberFormatter();
        }

        // === Toast Configuration (Global) ===
        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end', // Phía trên bên phải
            showConfirmButton: false,
            timer: 4000,
            timerProgressBar: true,
            didOpen: (toast) => {
                toast.addEventListener('mouseenter', Swal.stopTimer)
                toast.addEventListener('mouseleave', Swal.resumeTimer)
            }
        });

        
        document.addEventListener('DOMContentLoaded', function() {
            
            const successMsg = /*[[${successMsg}]]*/ null;
            const errorMsg = /*[[${errorMsg}]]*/ null;
            
            if (successMsg) {
                Toast.fire({ icon: 'success', title: successMsg });
            }
            if (errorMsg) {
                Toast.fire({ 
                    icon: 'error', 
                    title: 'Lỗi dữ liệu',
                    text: errorMsg,
                    timer: 6000 
                });
                // Tự động highlight ô lỗi
                highlightErrorFields(errorMsg);
            }
            
        });

        // Hàm tự động đánh dấu đỏ ô lỗi dựa trên nội dung thông báo
        function highlightErrorFields(msg) {
            const errorMap = [
                { keyword: 'email', selector: 'input[name="email"], input[type="email"]', label: 'Email không hợp lệ hoặc đã tồn tại' },
                { keyword: 'điện thoại', selector: 'input[name="soDienThoai"]', label: 'Số điện thoại không hợp lệ hoặc đã tồn tại' },
                { keyword: 'tên', selector: 'input[name="tenDayDu"], input[name="tenSanPham"], input[name="tenPhieu"]', label: 'Vui lòng kiểm tra lại họ tên' },
                { keyword: 'ngày sinh', selector: 'input[name="ngaySinh"]', label: 'Ngày sinh không hợp lệ (phải đủ 18 tuổi hoặc đúng định dạng)' },
                { keyword: 'giá', selector: '.number-format', label: 'Giá trị phải lớn hơn 0' },
                { keyword: 'số lượng', selector: 'input[name="soLuong"]', label: 'Số lượng không được để trống' }
            ];

            errorMap.forEach(item => {
                if (msg.toLowerCase().includes(item.keyword)) {
                    const el = document.querySelector(item.selector);
                    if (el) {
                        el.classList.add('is-invalid');
                        el.classList.add('shake-horizontal'); // Thêm hiệu ứng rung
                        
                        // Xóa lỗi khi người dùng bắt đầu gõ lại
                        el.addEventListener('input', function() {
                            this.classList.remove('is-invalid');
                            this.classList.remove('shake-horizontal');
                        }, { once: true });
                    }
                }
            });
        }
        
        // --- Global Real-time Validation ---
        function initRealTimeValidation() {
            const configs = [
                { name: 'soDienThoai', pattern: /^0\d{9}$/ },
                { name: 'email', pattern: /^[^\s@]+@[^\s@]+\.[^\s@]+$/ },
                { name: 'tenPhieu', pattern: /.{3,}/ },
                { name: 'tenDayDu', pattern: /.{2,}/ }
            ];

            configs.forEach(config => {
                document.querySelectorAll(`input[name="${config.name}"]`).forEach(el => {
                    el.addEventListener('blur', function() {
                        if (this.value !== "" && !config.pattern.test(this.value)) {
                            this.classList.add('is-invalid');
                        } else {
                            this.classList.remove('is-invalid');
                        }
                    });
                    el.addEventListener('input', function() {
                        if (this.classList.contains('is-invalid') && config.pattern.test(this.value)) {
                            this.classList.remove('is-invalid');
                        }
                    });
                });
            });
        }

        document.addEventListener('DOMContentLoaded', initRealTimeValidation);
    </script>
    <style>
        .is-invalid {
            border-color: #dc3545 !important;
            background-image: none !important;
            box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.25) !important;
        }
        .shake-horizontal {
            animation: shake-horizontal 0.5s cubic-bezier(0.455, 0.03, 0.515, 0.955) both;
        }
        @keyframes shake-horizontal {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
            90% { transform: translateX(-2px); }
        }
    </style>
</div>
</html>
