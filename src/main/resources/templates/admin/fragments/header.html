<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>
    <header th:fragment="header" class="header">
        <div class="header-action">
            <div class="theme-toggle me-3">
                <i class="bi bi-moon fs-5 cursor-pointer text-muted"></i>
            </div>

            <!-- Dropdown tài khoản -->
            <div class="dropdown">
                <div class="user-profile" data-bs-toggle="dropdown" aria-expanded="false">
                    <div class="user-avatar">
                        <i class="bi bi-person"></i>
                    </div>
                    <div class="user-info d-flex align-items-center gap-2">
                        <span class="user-name fw-semibold" style="font-size: 0.9rem;"
                              sec:authentication="name">Tài khoản</span>
                        <i class="bi bi-chevron-down" style="font-size: 0.7rem;"></i>
                    </div>
                </div>
                <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 rounded-3 mt-2">
                    <li>
                        <span class="dropdown-item-text text-muted" style="font-size:0.8rem;"
                              sec:authentication="name">email</span>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form th:action="@{/logout}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="dropdown-item text-danger">
                                <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </header>
</body>

</html>
