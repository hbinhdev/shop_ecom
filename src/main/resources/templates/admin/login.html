<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - PeakSneaker Admin</title>
    <link rel="icon" th:href="@{/assets/images/logo.png}" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #d47d32;
            --accent-gradient: linear-gradient(135deg, #d47d32 0%, #eb984e 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f7f6;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -30%;
            right: -10%;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(212,125,50,0.12) 0%, rgba(235,152,78,0.06) 100%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(212,125,50,0.08) 0%, rgba(235,152,78,0.04) 100%);
            pointer-events: none;
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 44px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 4px 16px rgba(0, 0, 0, 0.04);
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 32px;
        }

        .brand-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
            box-shadow: 0 4px 12px rgba(212,125,50,0.35);
        }

        .brand-name {
            font-size: 1.1rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #636e72;
            margin-bottom: 32px;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 8px;
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group-custom .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #b2bec3;
            font-size: 1rem;
            pointer-events: none;
            z-index: 2;
        }

        .input-group-custom .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #b2bec3;
            font-size: 1rem;
            cursor: pointer;
            z-index: 2;
            background: none;
            border: none;
            padding: 0;
        }

        .input-group-custom .toggle-pw:hover {
            color: var(--accent);
        }

        .form-control {
            height: 50px;
            padding-left: 44px;
            border: 1.5px solid #e9ecef;
            border-radius: 12px;
            font-size: 0.92rem;
            background: #f8f9fa;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(212,125,50,0.12);
            background: #fff;
            outline: none;
        }

        .form-control.is-invalid {
            border-color: #e74c3c;
            background: #fff5f5;
        }

        .btn-login {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 12px;
            background: var(--accent-gradient);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-top: 8px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(212,125,50,0.35);
            transition: all 0.2s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(212,125,50,0.45);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .alert-custom {
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-danger-custom {
            background: #fff5f5;
            border: 1px solid #fecaca;
            color: #e74c3c;
        }

        .alert-success-custom {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
        }

        .alert-info-custom {
            background: #fffbeb;
            border: 1px solid #fde68a;
            color: #d97706;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand">
                <div class="brand-icon">
                    <i class="bi bi-box-seam-fill"></i>
                </div>
                <span class="brand-name">PEAKSNEAKER</span>
            </div>

            <h2>Đăng nhập</h2>
            <p class="subtitle">Nhập thông tin tài khoản để tiếp tục</p>

            <div th:if="${param.error}" class="alert-custom alert-danger-custom">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span th:text="${param.error[0]}">Email hoặc mật khẩu không đúng</span>
            </div>

            <div th:if="${param.logout}" class="alert-custom alert-success-custom">
                <i class="bi bi-check-circle-fill"></i>
                Bạn đã đăng xuất thành công.
            </div>

            <div th:if="${param.sessionExpired}" class="alert-custom alert-info-custom">
                <i class="bi bi-clock-history"></i>
                Phiên đăng nhập đã hết hạn. Vui lòng đăng nhập lại.
            </div>

            <form id="adminLoginForm">
                <div>
                    <label class="form-label">Email</label>
                    <div class="input-group-custom">
                        <i class="bi bi-envelope icon"></i>
                        <input type="email"
                               id="email"
                               class="form-control"
                               placeholder="example@email.com"
                               required autofocus>
                    </div>
                </div>

                <div>
                    <label class="form-label">Mật khẩu</label>
                    <div class="input-group-custom">
                        <i class="bi bi-lock icon"></i>
                        <input type="password"
                               id="matKhau"
                               class="form-control"
                               placeholder="••••••••"
                               required>
                        <button type="button" class="toggle-pw" onclick="togglePassword()">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div id="errorAlert" class="alert-custom alert-danger-custom d-none">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    <span id="errorMessage"></span>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
                </button>
            </form>
        </div>
    </div>

    <script>
        // Xóa cookie khi đăng xuất
        if (window.location.search.includes('logout')) {
            document.cookie = "ADMIN_AUTH=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC;";
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
        }

        function togglePassword() {
            const input = document.getElementById('matKhau');
            const icon = document.getElementById('toggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errBox = document.getElementById('errorAlert');
            const errMsg = document.getElementById('errorMessage');
            
            const email = document.getElementById('email').value;
            const matKhau = document.getElementById('matKhau').value;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Đang xác thực...';
            errBox.classList.add('d-none');

            try {
                const res = await fetch('/api/auth/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, matKhau })
                });

                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUser', JSON.stringify({ email: data.username }));
                    window.location.href = '/admin/dashboard';
                } else {
                    errMsg.innerText = data.message || 'Lỗi đăng nhập hệ thống!';
                    errBox.classList.remove('d-none');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập';
                }
            } catch (err) {
                errMsg.innerText = 'Không thể kết nối tới máy chủ!';
                errBox.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập';
            }
        });
    </script>
</body>
</html>
