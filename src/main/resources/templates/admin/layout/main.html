<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, title)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:if="${title != null}" th:replace="${title}"></th:block>
    <title th:if="${title == null}">Bagi Store - Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sidebar-width: 280px;
            --primary-blue: #1e3a8a;
            --text-grey: #64748b;
            --bg-body: #f8fafc;
            --table-header-bg: #fff8f0;
            --border-color: #f1f5f9;
            --btn-orange: #C97A2C;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: #334155;
            margin: 0;
            display: flex;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: white;
            border-right: 1px solid #e2e8f0;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
        }

        .sidebar-brand {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo-img {
            width: 160px;
            height: 160px;
            object-fit: contain;
        }

        .sidebar-nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-nav li a {
            padding: 15px 30px;
            display: flex;
            align-items: center;
            color: #475569;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            gap: 15px;
        }

        .sidebar-nav li.active a {
            background-color: transparent;
            color: #0f172a;
            font-weight: 600;
        }

        .sidebar-nav li a i {
            font-size: 1.2rem;
            width: 25px;
            text-align: center;
            font-weight: 700 !important;
            -webkit-text-stroke: 0.5px currentColor;
            /* Hack to make bootstrap icons bolder */
        }

        /* Main Content */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            min-height: 100vh;
        }

        .header {
            height: 60px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 40px;
        }

        .content-body {
            padding: 40px;
        }

        /* Card & Filters */
        .card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: none;
            margin-bottom: 30px;
        }

        .card-header {
            padding: 20px 25px;
            font-weight: 700;
            color: #1e293b;
            border-bottom: 1px solid #f1f5f9;
        }

        .form-label {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .form-control,
        .form-select {
            border: 1px solid #cbd5e1;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .btn-reset {
            background-color: var(--btn-orange);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 25px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .btn-reset:hover {
            opacity: 0.9;
            color: white;
        }

        /* List Page Elements */
        .page-title {
            color: #0f172a;
            font-size: 1.7rem;
            font-weight: 700;
            margin: 0;
        }

        .page-subtitle {
            color: var(--text-grey);
            font-size: 0.95rem;
        }

        /* Table */
        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background-color: var(--table-header-bg);
            color: #475569;
            font-weight: 600;
            font-size: 0.8rem;
            padding: 20px 15px;
            border: none;
            text-align: center;
        }

        .table tbody td {
            padding: 20px 15px;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
            text-align: center;
            font-size: 0.9rem;
        }

        /* Statuses */
        .badge-status {
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.75rem;
            display: inline-block;
        }

        .status-completed {
            background-color: #f3e8ff;
            color: #a855f7;
        }

        .status-pending {
            background-color: #fff7ed;
            color: #ea580c;
        }

        .status-shipping {
            background-color: #e0f2fe;
            color: #0284c7;
        }

        .status-cancelled {
            background-color: #fee2e2;
            color: #ef4444;
        }

        .type-pill {
            background-color: #e0f2fe;
            color: #0284c7;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
        }

        .text-price {
            color: #C97A2C !important;
            font-weight: 700;
        }

        .action-circle {
            width: 38px;
            height: 38px;
            background-color: #1e3a8a;
            color: white;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <div class="main-wrapper">
        <div th:replace="~{admin/fragments/header :: header}"></div>

        <main class="content-body">
            <div th:replace="${content}"></div>
        </main>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
