<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, title)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf"        th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <th:block th:if="${title != null}" th:replace="${title}"></th:block>
    <title th:if="${title == null}">PeakSneaker - Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-red: #d47d32;
            --accent-red-gradient: linear-gradient(90deg, #d47d32 0%, #eb984e 100%);
            --text-dark: #2d3436;
            --border-color: #f1f2f6;
        }

        body {
            font-family: 'Outfit', 'Inter', system-ui, sans-serif;
            background-color: #f4f7f6;
            color: var(--text-dark);
            margin: 0;
        }

        .full-page-topbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 0 40px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 900;
            box-shadow: 0 1px 8px rgba(0,0,0,0.04);
        }

        .full-page-topbar .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            background: linear-gradient(135deg, #d47d32, #eb984e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
            text-decoration: none;
        }

        .full-page-topbar .brand i {
            font-size: 1.2rem;
        }

        .full-page-topbar .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.88rem;
            color: #636e72;
            font-weight: 500;
        }

        .full-page-topbar .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d47d32, #eb984e);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.9rem;
        }

        .full-page-content {
            padding: 30px 40px 60px;
        }
    </style>
</head>

<body>
    <!-- Top Bar (no sidebar) -->
    <div class="full-page-topbar">
        <a href="/admin" class="brand">
            <i class="bi bi-box-seam-fill"></i>
            PEAKSNEAKER ADMIN
        </a>
        <div class="user-info">
            <div class="user-avatar">
                <i class="bi bi-person"></i>
            </div>
            <span>Nguyễn Hoàng Admin</span>
        </div>
    </div>

    <!-- Full Width Content -->
    <div class="full-page-content">
        <div th:replace="${content}"></div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
