<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Không có quyền truy cập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background: #f4f7f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            text-align: center;
            background: #fff;
            border-radius: 20px;
            padding: 60px 48px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.07);
            max-width: 480px;
            width: 100%;
        }
        .error-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fff5eb, #ffe0c2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: #d47d32;
            margin: 0 auto 24px;
        }
        .error-code {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #d47d32, #eb984e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 12px;
        }
        h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 10px;
        }
        p {
            font-size: 0.9rem;
            color: #636e72;
            margin-bottom: 32px;
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 12px;
            background: linear-gradient(135deg, #d47d32, #eb984e);
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(212,125,50,0.3);
            transition: all 0.2s;
        }
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212,125,50,0.4);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        <div class="error-code">403</div>
        <h2>Bạn không có quyền truy cập</h2>
        <p>Trang này yêu cầu quyền cao hơn tài khoản của bạn.<br>Vui lòng liên hệ quản trị viên nếu cần hỗ trợ.</p>
        <a th:href="@{/admin/dashboard}" class="btn-back">
            <i class="bi bi-arrow-left"></i> Quay về trang chủ
        </a>
    </div>
</body>
</html>
