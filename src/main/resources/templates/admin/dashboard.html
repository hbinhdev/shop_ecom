<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout/main :: layout(~{::content}, ~{::title})}">

<th:block th:fragment="title">
    <title>Dashboard - PeakSneaker Admin</title>
</th:block>

<th:block th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="section-title mb-1">Tổng quan</h4>
            <p class="text-muted" style="font-size: 0.9rem;">Chào mừng trở lại, hệ thống đang hoạt động bình thường.</p>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-3">
            <div class="card border-0 rounded-4 shadow-sm p-4">
                <div class="d-flex align-items-center gap-3">
                    <div class="rounded-3 p-3" style="background:#fff5eb;">
                        <i class="bi bi-receipt fs-4" style="color:#d47d32;"></i>
                    </div>
                    <div>
                        <div class="text-muted" style="font-size:0.8rem;">Đơn hàng hôm nay</div>
                        <div class="fw-bold fs-5">—</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 rounded-4 shadow-sm p-4">
                <div class="d-flex align-items-center gap-3">
                    <div class="rounded-3 p-3" style="background:#f0fdf4;">
                        <i class="bi bi-people fs-4" style="color:#16a34a;"></i>
                    </div>
                    <div>
                        <div class="text-muted" style="font-size:0.8rem;">Khách hàng</div>
                        <div class="fw-bold fs-5">—</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 rounded-4 shadow-sm p-4">
                <div class="d-flex align-items-center gap-3">
                    <div class="rounded-3 p-3" style="background:#eff6ff;">
                        <i class="bi bi-box-seam fs-4" style="color:#2563eb;"></i>
                    </div>
                    <div>
                        <div class="text-muted" style="font-size:0.8rem;">Sản phẩm</div>
                        <div class="fw-bold fs-5">—</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 rounded-4 shadow-sm p-4">
                <div class="d-flex align-items-center gap-3">
                    <div class="rounded-3 p-3" style="background:#fdf4ff;">
                        <i class="bi bi-graph-up fs-4" style="color:#9333ea;"></i>
                    </div>
                    <div>
                        <div class="text-muted" style="font-size:0.8rem;">Doanh thu</div>
                        <div class="fw-bold fs-5">—</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>
</html>
