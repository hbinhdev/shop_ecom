<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{client/layout/main :: layout(~{::main}, ${pageTitle})}">

<body>
    <main>
        <section class="hero-section">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-lg-7">
                        <h1 class="mb-4">Hệ thống giày Sneaker <br><span class="text-primary">đẳng cấp</span></h1>
                        <p class="lead mb-5 opacity-75">Khám phá bộ sưu tập mới nhất với chất lượng dịch vụ hàng đầu.</p>
                        <div class="d-flex gap-3">
                            <a th:href="@{/san-pham}" class="btn btn-premium text-white px-5">MUA NGAY</a>
                        </div>
                    </div>
                    <div class="col-lg-5 d-none d-lg-block">
                        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=600" class="img-fluid rounded-4" alt="Hero">
                    </div>
                </div>
            </div>
        </section>

        
        <section class="py-4 border-top border-bottom bg-white">
            <div class="container">
                <div class="d-flex gap-4 align-items-center overflow-auto scroll-hide py-2">
                    <div th:each="v : ${hotVouchers}" class="d-flex align-items-center gap-3 pe-4 border-end">
                        <div class="text-primary fs-4"><i class="bi bi-patch-check-fill"></i></div>
                        <div>
                            <div class="fw-bold small" th:text="${v.tenPhieu}">Tên phiếu</div>
                            <div class="text-primary small fw-bold" th:text="${v.giaTriGiam} + ' ' + ${v.hinhThucGiam}">Giảm 50k</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        
        <section class="py-5">
            <div class="container">
                <div class="d-flex justify-content-between align-items-end mb-5">
                    <div>
                        <h2 class="section-title-premium fs-1">SẢN PHẨM MỚI NHẤT</h2>
                        <p class="text-muted mt-2 mb-0">Những mẫu Sneaker vừa cập bến tại PeakSneaker.</p>
                    </div>
                    <a th:href="@{/san-pham}" class="btn btn-outline-dark rounded-pill px-4 py-2 fw-bold small">XEM TẤT CẢ <i class="bi bi-arrow-right ms-1"></i></a>
                </div>
                <div class="row g-4">
                    <div th:each="p : ${latestProducts}" class="col-6 col-md-3">
                        <a th:href="@{'/san-pham/detail/' + ${p.id}}" class="text-decoration-none p-card-link">
                            <div class="product-card h-100">
                                <div class="product-img-wrapper" th:with="displayImg=${p.duongDanAnh != null ? p.duongDanAnh : (p.danhSachHinhAnh != null && !p.danhSachHinhAnh.isEmpty() ? p.danhSachHinhAnh[0].duongDan : (p.danhSachChiTiet != null && !p.danhSachChiTiet.isEmpty() && p.danhSachChiTiet[0].duongDanAnh != null ? p.danhSachChiTiet[0].duongDanAnh : null))}">
                                    <img th:src="${displayImg != null ? (displayImg.startsWith('http') ? displayImg : '/uploads/san-pham/' + displayImg) : 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=600'}" th:alt="${p.tenSanPham}">
                                </div>
                                <div class="card-content">
                                    <small class="text-muted mb-1 d-block" th:text="${p.danhMuc != null ? p.danhMuc.tenDanhMuc : 'Sneaker'}">Sneaker</small>
                                    <h6 class="fw-bold text-dark mb-2 product-title" th:text="${p.tenSanPham}">Tên giày</h6>
                                    <div class="mt-auto">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <span class="fw-bold text-danger fs-6" th:text="${p.getKhoangGia()}">Giá</span>
                                            <i class="bi bi-arrow-right-short text-danger fs-5"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <style>
        .product-card {
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            background: #fff;
            display: flex;
            flex-direction: column;
            border: 1px solid #eee !important;
        }

        .product-img-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background-color: #f8f9fa;
        }

        .product-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-img-wrapper img {
            transform: scale(1.05);
        }

        .p-card-link:hover .product-card {
            transform: translateY(-5px);
            border-color: #ff4d00 !important;
        }

        .card-content {
            padding: 1rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-title {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.6rem;
            line-height: 1.3;
            font-size: 0.95rem;
        }
    </style>
</body>
</html>
