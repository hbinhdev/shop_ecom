<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{client/layout/main :: layout(~{::main}, ${pageTitle})}">

<body>
    <main class="py-5">
        <div class="container">
            <div class="row g-4">

                <aside class="col-lg-3">
                    <div class="card border-0 shadow-sm rounded-4 p-4 sticky-top" style="top: 100px;">
                        <h5 class="fw-bold mb-4 border-bottom pb-2">BỘ LỌC</h5>


                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted">TÌM KIẾM</label>
                            <div class="input-group">
                                <input type="text" class="form-control border-end-0 shadow-none border-secondary-subtle"
                                    placeholder="Tìm giày...">
                                <span class="input-group-text bg-white border-start-0 border-secondary-subtle"><i
                                        class="bi bi-search"></i></span>
                            </div>
                        </div>


                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted text-uppercase">Danh mục</label>
                            <div class="d-flex flex-column gap-2">
                                <div class="form-check" th:each="dm : ${danhMucs}">
                                    <input class="form-check-input" type="checkbox" th:value="${dm.id}"
                                        th:id="'cat' + ${dm.id}">
                                    <label class="form-check-label small" th:for="'cat' + ${dm.id}"
                                        th:text="${dm.tenDanhMuc}">Danh mục</label>
                                </div>
                            </div>
                        </div>


                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted text-uppercase">Thương hiệu</label>
                            <div class="d-flex flex-column gap-2">
                                <div class="form-check" th:each="th : ${thuongHieus}">
                                    <input class="form-check-input" type="checkbox" th:value="${th.id}"
                                        th:id="'brand' + ${th.id}">
                                    <label class="form-check-label small" th:for="'brand' + ${th.id}"
                                        th:text="${th.tenThuongHieu}">Thương hiệu</label>
                                </div>
                            </div>
                        </div>


                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted text-uppercase">Khoảng giá</label>
                            <input type="range" class="form-range" min="0" max="10000000" step="500000">
                            <div class="d-flex justify-content-between small text-muted">
                                <span>0đ</span>
                                <span>10tr+</span>
                            </div>
                        </div>

                        <button class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow-sm">ÁP DỤNG</button>
                    </div>
                </aside>


                <div class="col-lg-9">
                    <!-- <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="text-muted small">Hiển thị <span th:text="${products.size()}">0</span> sản
                            phẩm</span>
                        <select class="form-select w-auto border-0 shadow-none small fw-bold">
                            <option>Mới nhất</option>
                            <option>Giá thấp đến cao</option>
                            <option>Giá cao đến thấp</option>
                        </select>
                    </div> -->

                    <div class="row g-4">
                        <div th:each="p : ${products}" class="col-6 col-md-4">
                            <a th:href="@{'/san-pham/detail/' + ${p.id}}"
                                class="text-decoration-none p-card-link d-block h-100">
                                <div class="product-card border-0 shadow-sm h-100">
                                    <div class="product-img-wrapper mb-3">
                                        <img th:src="${p.duongDanAnh != null ? '/uploads/san-pham/' + p.duongDanAnh : 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=600'}"
                                            th:alt="${p.tenSanPham}">
                                    </div>
                                    <div class="d-flex flex-column flex-grow-1">
                                        <small class="text-muted"
                                            th:text="${p.danhMuc != null ? p.danhMuc.tenDanhMuc : 'Sneaker'}">Sneaker</small>
                                        <h6 class="fw-bold text-dark mb-2 text-truncate" th:text="${p.tenSanPham}">Tên
                                            giày Sneaker</h6>
                                        <div class="mt-auto d-flex justify-content-between align-items-center">
                                            <span class="fw-bold text-primary small">Chi tiết</span>
                                            <i class="bi bi-arrow-right-short text-primary fs-5"></i>
                                        </div>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <style>
        .p-card-link:hover .product-card {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(212, 125, 50, 0.2) !important;
        }

        .form-check-input:checked {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }
    </style>
</body>

</html>
